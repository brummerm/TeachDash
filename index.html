<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f4f5f7;
  --border: #e0e3e8;
  --text: #1a1a2e;
  --text2: #6b7280;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --shadow: 0 1px 6px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
  --radius: 12px;
  --header-h: 52px;
}
[data-theme="dark"] {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242736;
  --border: #2e3347;
  --text: #e8eaf0;
  --text2: #8b92a8;
  --accent: #60a5fa;
  --accent2: #3b82f6;
  --shadow: 0 1px 6px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.25);
}
[data-theme="contrast"] {
  --bg: #000;
  --surface: #111;
  --surface2: #1c1c1c;
  --border: #ffdd00;
  --text: #fff;
  --text2: #ffdd00;
  --accent: #ffdd00;
  --accent2: #ccb000;
  --danger: #ff4444;
  --success: #44ff88;
  --shadow: 0 0 0 1px #ffdd00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background 0.2s, color 0.2s;
}
/* HEADER */
#header {
  position: sticky; top: 0; z-index: 200;
  height: var(--header-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 6px; box-shadow: var(--shadow);
}
#header-title { font-size: 16px; font-weight: 700; color: var(--accent); margin-right: 8px; white-space: nowrap; }
.hdr-sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.hdr-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 11px; border-radius: 7px;
  cursor: pointer; font-size: 12px; font-weight: 500;
  transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
}
.hdr-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.hdr-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.hdr-btn.lock-on { background: var(--danger); color: #fff; border-color: var(--danger); }
.profile-wrap { display: flex; align-items: center; gap: 4px; }
.profile-wrap span { font-size: 11px; color: var(--text2); }
.prof-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.12s;
}
.prof-btn:hover, .prof-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
#header-spacer { flex: 1; }
/* CANVAS */
#grid {
  position: relative;
  min-height: calc(100vh - var(--header-h));
  overflow: visible;
}
/* WIDGET */
.widget {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  transition: box-shadow 0.15s, border-color 0.15s;
  position: absolute;
  overflow: visible;
}
.widget:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.13), 0 1px 6px rgba(0,0,0,0.08); }
/* RESIZE HANDLES — all edges + corners */
.rh { position: absolute; z-index: 20; opacity: 0; transition: opacity 0.15s; }
.widget:hover .rh { opacity: 1; }
body.locked .rh { display: none; }
/* Right edge */
.rh-e { right: 0; top: 30px; bottom: 8px; width: 8px; cursor: ew-resize; }
.rh-e::after { content:''; position:absolute; right:1px; top:50%; transform:translateY(-50%); width:3px; height:32px; background:var(--accent); border-radius:2px; }
/* Left edge */
.rh-w { left: 0; top: 30px; bottom: 8px; width: 8px; cursor: ew-resize; }
.rh-w::after { content:''; position:absolute; left:1px; top:50%; transform:translateY(-50%); width:3px; height:32px; background:var(--accent); border-radius:2px; }
/* Bottom edge */
.rh-s { bottom: 0; left: 10px; right: 10px; height: 8px; cursor: ns-resize; }
.rh-s::after { content:''; position:absolute; bottom:1px; left:50%; transform:translateX(-50%); width:36px; height:3px; background:var(--accent); border-radius:2px; }
/* Top edge — sits just below header bar */
.rh-n { top: 28px; left: 10px; right: 10px; height: 8px; cursor: ns-resize; }
.rh-n::after { content:''; position:absolute; top:1px; left:50%; transform:translateX(-50%); width:36px; height:3px; background:var(--accent); border-radius:2px; }
/* Corners */
.rh-se { bottom:0; right:0; width:12px; height:12px; cursor:nwse-resize; background:var(--accent); border-radius:3px 0 4px 0; opacity:0 !important; }
.rh-sw { bottom:0; left:0; width:12px; height:12px; cursor:nesw-resize; background:var(--accent); border-radius:0 3px 0 4px; opacity:0 !important; }
.rh-ne { top:28px; right:0; width:12px; height:12px; cursor:nesw-resize; background:var(--accent); border-radius:0 3px 4px 0; opacity:0 !important; }
.rh-nw { top:28px; left:0; width:12px; height:12px; cursor:nwse-resize; background:var(--accent); border-radius:3px 0 0 4px; opacity:0 !important; }
.widget:hover .rh-se,.widget:hover .rh-sw,.widget:hover .rh-ne,.widget:hover .rh-nw { opacity:0.75 !important; }
body.resizing-ew   { cursor:ew-resize   !important; user-select:none !important; }
body.resizing-ns   { cursor:ns-resize   !important; user-select:none !important; }
body.resizing-nwse { cursor:nwse-resize !important; user-select:none !important; }
body.resizing-nesw { cursor:nesw-resize !important; user-select:none !important; }
body.moving        { cursor:grabbing    !important; user-select:none !important; }
/* WIDGET HEADER */
.wh {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; background: var(--surface2);
  border-bottom: 1px solid var(--border); cursor: grab; user-select: none;
  border-radius: var(--radius) var(--radius) 0 0; flex-shrink: 0;
}
.wh:active { cursor: grabbing; }
body.locked .wh { cursor: default; }
.wh-icon { font-size: 14px; flex-shrink: 0; }
.wh-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.wh-title[contenteditable="true"] { cursor: text; border-bottom: 1px solid var(--accent); outline: none; }
.wh-controls { display: flex; gap: 2px; flex-shrink: 0; }
.wc {
  width: 20px; height: 20px; border-radius: 4px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; line-height: 1;
}
.wc:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.wc.rm:hover { background: var(--danger); border-color: var(--danger); }
.wc.on { background: var(--accent); color: #fff; border-color: var(--accent); }
body.locked .wc:not(.no-lock) { pointer-events: none; opacity: 0.3; }
.wb { flex: 1; padding: 14px; overflow: auto; min-height: 0; }
/* SHARED */
.btn { padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.12s; }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: var(--accent2); }
.btn-p:active { transform: scale(0.97); }
.btn-s { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.btn-s:hover { background: var(--border); }
.btn-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
.sm { padding: 5px 10px; font-size: 11px; }
input[type="text"], input[type="url"], input[type="number"], input[type="time"], textarea, select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit;
  font-size: 13px; padding: 6px 10px; width: 100%;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
/* CLOCK */
.clock-time { font-size: clamp(36px,9vw,80px); font-weight: 200; font-variant-numeric: tabular-nums; text-align: center; line-height: 1; }
.clock-date { font-size: 13px; color: var(--text2); text-align: center; margin-top: 6px; }
/* BIG TIME */
.big-time { font-size: clamp(28px,6vw,60px); font-weight: 300; font-variant-numeric: tabular-nums; text-align: center; line-height: 1; margin-bottom: 10px; }
.big-time.warn { color: var(--warning); }
.big-time.crit { color: var(--danger); }
.prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 1s linear, background 0.4s; }
/* TIMER */
.timer-inputs { display: flex; gap: 6px; align-items: center; justify-content: center; margin-bottom: 8px; }
.t-inp { width: 52px; text-align: center; font-size: 16px; padding: 5px; }
.presets { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 8px; }
.preset { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 3px 7px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.1s; }
.preset:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.preset.pass { border-color: var(--warning); color: var(--warning); }
.preset.pass:hover { background: var(--warning); color: #fff; border-color: var(--warning); }
/* STOPWATCH */
.sw-laps { max-height: 130px; overflow-y: auto; margin-top: 8px; }
.sw-lap { display: flex; justify-content: space-between; padding: 3px 6px; font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text2); border-bottom: 1px solid var(--border); }
.sw-lap:last-child { border: none; }
/* POMODORO */
.pomo-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 10px; }
.pomo-wrap svg { transform: rotate(-90deg); }
.pr-bg { fill: none; stroke: var(--border); stroke-width: 8; }
.pr-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.pomo-label-ring { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 300; font-variant-numeric: tabular-nums; }
.pomo-phase { font-size: 11px; font-weight: 700; color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.pomo-count { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 8px; }
.pomo-cfg-row { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.pomo-cfg-row input { width: 52px; text-align: center; }
/* NOTES */
.notes-ta { width: 100%; flex: 1; min-height: 0; background: transparent; border: none; color: var(--text); font-size: 14px; line-height: 1.65; resize: none; outline: none; padding: 0; }
.notes-footer { display: flex; justify-content: flex-end; margin-top: 6px; flex-shrink: 0; }
/* CHECKLIST */
.cl-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.cl-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px; background: var(--surface2); }
.cl-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.cl-item .cl-text { flex: 1; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; }
.cl-item.done .cl-text { text-decoration: line-through; opacity: 0.55; }
.cl-del { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 13px; padding: 0 2px; opacity: 0.4; transition: opacity 0.1s; }
.cl-del:hover { opacity: 1; color: var(--danger); }
.cl-add { display: flex; gap: 6px; }
.cl-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text2); gap: 6px; flex-wrap: wrap; }
.cl-progress { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 80px; }
.cl-prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.cl-prog-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }
/* CALCULATOR */
.calc-screen { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: right; margin-bottom: 8px; }
.calc-expr { font-size: 11px; color: var(--text2); min-height: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.calc-val { font-size: 26px; font-weight: 300; font-variant-numeric: tabular-nums; word-break: break-all; }
.calc-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.cb { padding: 9px 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.08s; text-align: center; }
.cb:hover { background: var(--border); }
.cb:active { transform: scale(0.94); }
.cb.op { color: var(--accent); font-weight: 700; }
.cb.clr { color: var(--danger); }
.cb.eq { background: var(--accent); color: #fff; border-color: var(--accent); }
.cb.eq:hover { background: var(--accent2); }
.cb.dbl { grid-column: span 2; }
/* YOUTUBE */
.yt-controls { display: flex; gap: 6px; margin-bottom: 8px; }
.yt-url { flex: 1; }
.yt-frame { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; background: #000; }
.yt-empty { width: 100%; aspect-ratio: 16/9; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 13px; border: 2px dashed var(--border); }
/* NAME PICKER */
.picker-result { font-size: clamp(18px,4vw,32px); font-weight: 700; color: var(--accent); text-align: center; min-height: 50px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; word-break: break-word; margin-bottom: 8px; }
.picker-result.spinning { animation: spin-pick 0.1s infinite; }
@keyframes spin-pick { 0%,100%{opacity:1}50%{opacity:0.45} }
.picker-names { min-height: 80px; resize: vertical; font-size: 13px; margin-top: 6px; padding: 8px; }
.picker-meta { font-size: 11px; color: var(--text2); text-align: right; margin-top: 3px; }
/* NOISE */
.noise-bars { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 70px; margin: 8px 0; }
.n-bar { width: 11px; background: var(--success); border-radius: 3px 3px 0 0; min-height: 3px; transition: height 0.1s; }
.n-bar.m { background: var(--warning); }
.n-bar.h { background: var(--danger); }
.noise-pct { font-size: 28px; font-weight: 300; text-align: center; }
.noise-status { font-size: 12px; color: var(--text2); text-align: center; margin-top: 4px; }
.noise-thresh { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--text2); }
.noise-thresh input[type="range"] { flex: 1; accent-color: var(--accent); }
.mic-btn { width: 100%; padding: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 12px; transition: all 0.15s; }
.mic-btn.on { background: var(--danger); color: #fff; border-color: var(--danger); }
/* QR */
.qr-box { display: flex; justify-content: center; padding: 12px; background: #fff; border-radius: 8px; margin-top: 8px; }
.qr-empty { text-align: center; padding: 16px; color: var(--text2); font-size: 12px; }
/* WEBCLIP */
.wc-frame { width: 100%; flex: 1; min-height: 0; border: 0; border-radius: 8px; background: #fff; }
/* SEATING CHART */
.seat-grid { display: grid; gap: 3px; margin-top: 6px; }
.seat-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 2px; text-align: center; cursor: pointer; font-size: 10px; min-height: 34px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; word-break: break-word; line-height: 1.2; }
.seat-cell:hover { border-color: var(--accent); background: var(--surface); }
.seat-cell.occupied { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.seat-cell.occupied:hover { background: var(--accent2); }
.seat-empty-label { font-size: 14px; color: var(--border); font-weight: 300; }
/* ANNOUNCEMENT TICKER */
.ticker-display { font-size: clamp(15px,3vw,26px); font-weight: 600; text-align: center; padding: 14px 12px; background: var(--surface2); border-radius: 8px; min-height: 80px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); margin-bottom: 8px; word-break: break-word; line-height: 1.3; }
.ticker-nav { display: flex; gap: 6px; justify-content: center; align-items: center; margin-bottom: 8px; }
.ticker-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
.ticker-dot.on { background: var(--accent); }
/* DICE / RANDOM */
.big-result { font-size: clamp(36px,9vw,80px); font-weight: 200; color: var(--accent); text-align: center; line-height: 1; min-height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.dice-types { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 8px; }
.d-btn { padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.1s; }
.d-btn:hover, .d-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.dice-count-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 8px; font-size: 12px; color: var(--text2); }
.dice-count-row input { width: 50px; text-align: center; }
.rand-range { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 8px; font-size: 12px; color: var(--text2); }
.rand-range input { width: 64px; text-align: center; }
/* PERIOD */
.period-name-disp { font-size: 11px; font-weight: 700; color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.period-next { text-align: center; font-size: 11px; color: var(--text2); margin-bottom: 6px; min-height: 16px; }
/* TOGGLE BUTTONS */
.mode-row { display: flex; gap: 4px; margin-bottom: 10px; }
.toggle-btn { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; text-align: center; }
.toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
.toggle-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.toggle-btn.sm { flex: 0 0 auto; padding: 4px 8px; font-size: 10px; }
/* DAY TABS */
.day-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0; }
/* SCHEDULE EDITOR */
.sched-edit-list { display: flex; flex-direction: column; gap: 4px; margin: 6px 0; }
.sched-row { display: grid; grid-template-columns: 1fr 74px 10px 74px 22px; gap: 4px; align-items: center; }
.sched-row input[type="text"] { font-size: 11px; padding: 4px 6px; }
.sched-row input[type="time"] { font-size: 11px; padding: 4px 6px; }
.sched-sep { font-size: 10px; color: var(--text2); text-align: center; }
.sched-del { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 12px; padding: 0; opacity: 0.45; transition: opacity 0.1s; }
.sched-del:hover { opacity: 1; color: var(--danger); }
.sched-empty { text-align: center; padding: 12px 8px; color: var(--text2); font-size: 11px; background: var(--surface2); border-radius: 6px; border: 1px dashed var(--border); }
.copy-day-btn { font-size: 10px; padding: 3px 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 4px; cursor: pointer; transition: all 0.1s; }
.copy-day-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
/* DETAILS */
details > summary { cursor: pointer; font-size: 11px; color: var(--text2); margin-top: 10px; list-style: none; display: flex; align-items: center; gap: 4px; }
details > summary::before { content: '\25B6'; font-size: 8px; transition: transform 0.15s; }
details[open] > summary::before { transform: rotate(90deg); }
.config-block { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
/* DO NOW / EXIT TICKET */
.donow-wrap { display: flex; flex-direction: column; height: 100%; gap: 8px; }
.donow-mode-row { display: flex; gap: 4px; }
.donow-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; align-self: flex-start; }
.donow-tag.donow { background: var(--accent); color: #fff; }
.donow-tag.exit { background: #f59e0b; color: #fff; }
.donow-display { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: auto; }
.donow-prompt { font-size: clamp(18px, 3vw, 30px); font-weight: 600; line-height: 1.35; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.donow-sub { font-size: 13px; color: var(--text2); font-style: italic; line-height: 1.45; }

<script>
const DEFS = [
  { type:'clock',     icon:'&#x1F550;', label:'Clock',           desc:'Live clock & date' },
  { type:'period',    icon:'&#x1F4C5;', label:'Period Countdown', desc:'Full daily/weekly schedule' },

  { type:'notes',     icon:'&#x1F4DD;', label:'Notes',            desc:'Freeform scratch pad' },
  { type:'checklist', icon:'&#x2611;',  label:'Checklist',        desc:'Class agenda & tasks' },
  { type:'calculator',icon:'&#x1F522;', label:'Calculator',       desc:'Standard calculator' },
  { type:'youtube',   icon:'&#x25B6;',  label:'YouTube Player',   desc:'Embed any video' },
  { type:'picker',    icon:'&#x1F3AF;', label:'Name Picker',      desc:'Random student selector' },
  { type:'noise',     icon:'&#x1F50A;', label:'Noise Meter',      desc:'Mic volume monitor' },
  { type:'qrcode',    icon:'&#x1F4F1;', label:'QR Code',          desc:'Generate QR from text' },
  { type:'webclip',   icon:'&#x1F310;', label:'Web Clip',         desc:'Embed any webpage' },
  { type:'dice',      icon:'&#x1F3B2;', label:'Dice Roller',      desc:'Roll any dice type' },
  { type:'random',    icon:'&#x1F500;', label:'Random Number',    desc:'Random number range' },
  { type:'seating',   icon:'&#x1F4BA;', label:'Seating Chart',    desc:'Drag-and-drop class seating' },
  { type:'ticker',    icon:'&#x1F4E3;', label:'Announcements',     desc:'Rotating classroom announcements' },
  { type:'donow',     icon:'&#x1F4CC;', label:'Do Now / Exit',     desc:'Big-text warmup or exit prompt' },
  { type:'rotation',  icon:'&#x1F501;', label:'Rotation Timer',    desc:'Auto-advancing station timer' },
  { type:'whiteboard',icon:'&#x270F;',  label:'Whiteboard',        desc:'Quick freehand sketch space' },
  { type:'spinner',   icon:'&#x1F3A1;', label:'Spinner Wheel',     desc:'Animated wheel of student names' },
  { type:'soundboard',icon:'&#x1F3B5;', label:'Sound Board',       desc:'Bell, applause, chimes, buzzer' },
  { type:'code',      icon:'&#x1F4BB;', label:'Code Snippet',      desc:'Highlighted code for projection' },
];

// Default pixel sizes [width, height] per widget type
const DEFAULT_SIZES = {
  clock:      [220, 155],
  period:     [400, 310],
  timer:      [280, 295],
  stopwatch:  [240, 215],
  pomodoro:   [290, 365],
  notes:      [340, 270],
  checklist:  [340, 295],
  calculator: [270, 395],
  youtube:    [500, 375],
  picker:     [340, 295],
  noise:      [290, 295],
  qrcode:     [240, 265],
  webclip:    [500, 395],
  dice:       [240, 255],
  random:     [240, 205],
  seating:    [520, 420],
  ticker:     [420, 240],
  donow:      [420, 320],
  rotation:   [320, 400],
  whiteboard: [500, 400],
  spinner:    [380, 460],
  soundboard: [340, 280],
  code:       [460, 380],
};

let S = {
  theme: 'light', locked: false, activeProfile: 0,
  profiles: [{ widgets:[] },{ widgets:[] },{ widgets:[] },{ widgets:[] }]
};

// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCtfgEpffjLTXuxRujL--7vAhJsD47noYM",
  authDomain: "teachdash-c3dee.firebaseapp.com",
  projectId: "teachdash-c3dee",
  storageBucket: "teachdash-c3dee.firebasestorage.app",
  messagingSenderId: "121635702303",
  appId: "1:121635702303:web:502424050023b938b2b72a",
  measurementId: "G-QVZ8GF010C"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── AUTH & STORAGE ──
let currentUser  = null; // Firebase user object, or the string 'guest'
let _saveTimer   = null;
let _pendingSave = false;

function loadS() {
  // Guest only: read from localStorage (with legacy key migration)
  try {
    let r = localStorage.getItem('tdash-v5-guest');
    if (!r) r = localStorage.getItem('tdash-v5');
    if (r) S = { ...S, ...JSON.parse(r) };
  } catch(e) {}
}

function saveS() {
  if (currentUser && currentUser !== 'guest') {
    // Cloud: debounced Firestore write
    _pendingSave = true;
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
      if (!_pendingSave) return;
      _pendingSave = false;
      db.collection('users').doc(currentUser.uid).set({ dashboard: S })
        .catch(e => console.warn('Firestore save error:', e));
    }, 800);
  } else {
    // Guest: localStorage
    try { localStorage.setItem('tdash-v5-guest', JSON.stringify(S)); } catch(e) {}
  }
}

async function flushSave() {
  if (!_pendingSave) return;
  clearTimeout(_saveTimer);
  _pendingSave = false;
  if (currentUser && currentUser !== 'guest') {
    try { await db.collection('users').doc(currentUser.uid).set({ dashboard: S }); } catch(e) {}
  }
}

function prof() { return S.profiles[S.activeProfile]; }

function fbErrMsg(code) {
  const map = {
    'auth/invalid-email':         'Invalid email address.',
    'auth/user-not-found':        'No account found with that email.',
    'auth/wrong-password':        'Incorrect password.',
    'auth/invalid-credential':    'Incorrect email or password.',
    'auth/email-already-in-use':  'An account with that email already exists.',
    'auth/weak-password':         'Password must be at least 6 characters.',
    'auth/too-many-requests':     'Too many attempts. Please try again later.',
    'auth/network-request-failed':'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

async function showDashboard(fbUser) {
  currentUser = fbUser || 'guest';
  const displayName = fbUser ? (fbUser.displayName || fbUser.email) : 'Guest';

  // Reset state, then load saved data
  S = { theme:'light', locked:false, activeProfile:0, profiles:[{widgets:[]},{widgets:[]},{widgets:[]},{widgets:[]}] };
  if (fbUser) {
    try {
      const doc = await db.collection('users').doc(fbUser.uid).get();
      if (doc.exists && doc.data().dashboard) S = { ...S, ...doc.data().dashboard };
    } catch(e) { console.warn('Firestore load failed, using defaults:', e); }
  } else {
    loadS();
  }

  const ud = g('user-display');
  if (ud) ud.textContent = displayName;
  g('login-screen').style.display = 'none';
  g('app').style.display = 'block';
  initDashboard();
}

function initAuth() {
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.dataset.theme = 'dark';

  // Auto-login if Firebase session is still active
  auth.onAuthStateChanged(user => {
    if (user && g('app').style.display === 'none') showDashboard(user);
  });

  // Tab switching
  document.querySelectorAll('.auth-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(b => b.classList.toggle('on', b === btn));
      g('tab-signin').style.display  = btn.dataset.tab === 'signin'   ? 'flex' : 'none';
      g('tab-register').style.display = btn.dataset.tab === 'register' ? 'flex' : 'none';
    });
  });

  // Sign in
  g('l-submit')?.addEventListener('click', async () => {
    const email = (g('l-email')?.value || '').trim();
    const pass  = g('l-pass')?.value || '';
    const errEl = g('l-err');
    if (errEl) errEl.textContent = '';
    if (!email) { if (errEl) errEl.textContent = 'Email required.'; return; }
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      // onAuthStateChanged fires → showDashboard
    } catch(e) {
      if (errEl) errEl.textContent = fbErrMsg(e.code);
    }
  });
  [g('l-email'), g('l-pass')].forEach(el => el?.addEventListener('keydown', e => { if (e.key === 'Enter') g('l-submit')?.click(); }));

  // Register
  g('r-submit')?.addEventListener('click', async () => {
    const email = (g('r-email')?.value || '').trim();
    const pass  = g('r-pass')?.value  || '';
    const pass2 = g('r-pass2')?.value || '';
    const errEl = g('r-err');
    if (errEl) errEl.textContent = '';
    if (pass !== pass2) { if (errEl) errEl.textContent = 'Passwords do not match.'; return; }
    try {
      await auth.createUserWithEmailAndPassword(email, pass);
      // onAuthStateChanged fires → showDashboard
    } catch(e) {
      if (errEl) errEl.textContent = fbErrMsg(e.code);
    }
  });

  // Guest
  g('guest-btn')?.addEventListener('click', () => showDashboard(null));
}

let _uid=1;
function uid() { return 'w'+(_uid++)+'_'+(Date.now()%1e8); }
const cleanups={};
function cleanup(id) { if(cleanups[id]){ cleanups[id](); delete cleanups[id]; } }
function g(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt2(n) { return String(Math.floor(Math.abs(+n))).padStart(2,'0'); }

// ── Z-INDEX ──
let _zCounter = 100;
function bringToFront(el, w) {
  _zCounter++;
  w.z = _zCounter;
  el.style.zIndex = _zCounter;
}

// ── AUTO-PLACE ──
// Place widget idx in a 3-column cascade
function autoPlaceAt(idx, wPx, hPx) {
  const gap = 14, cols = 3;
  const colW = Math.max(wPx, 280) + gap;
  const rowH = Math.max(hPx, 200) + gap;
  return { x: gap + (idx % cols) * colW, y: gap + Math.floor(idx / cols) * rowH };
}
function autoPlace(wPx, hPx) {
  return autoPlaceAt(prof().widgets.length, wPx, hPx);
}

// ── BUILD WIDGET ──
function buildWidget(w) {
  const def=DEFS.find(d=>d.type===w.type); if(!def) return null;
  const el=document.createElement('div');
  el.className='widget'; el.dataset.id=w.id; el.dataset.type=w.type;
  // Freeform absolute position
  el.style.left   = (w.x   ?? 14) + 'px';
  el.style.top    = (w.y   ?? 14) + 'px';
  el.style.width  = (w.wPx ?? (DEFAULT_SIZES[w.type]||[300])[0]) + 'px';
  el.style.height = (w.hPx ?? (DEFAULT_SIZES[w.type]||[0,280])[1]) + 'px';
  if (w.z) el.style.zIndex = w.z;

  el.innerHTML=`
    <div class="wh">
      <span class="wh-icon">${def.icon}</span>
      <span class="wh-title" title="Double-click to rename">${esc(w.title||def.label)}</span>
      <div class="wh-controls">
        <button class="wc rm" title="Remove">&#x2715;</button>
      </div>
    </div>
    <div class="wb" id="wb-${w.id}"></div>
    <div class="rh rh-e"  data-rh="e"  title="Drag to resize"></div>
    <div class="rh rh-w"  data-rh="w"  title="Drag to resize"></div>
    <div class="rh rh-s"  data-rh="s"  title="Drag to resize"></div>
    <div class="rh rh-n"  data-rh="n"  title="Drag to resize"></div>
    <div class="rh rh-se" data-rh="se" title="Drag to resize"></div>
    <div class="rh rh-sw" data-rh="sw" title="Drag to resize"></div>
    <div class="rh rh-ne" data-rh="ne" title="Drag to resize"></div>
    <div class="rh rh-nw" data-rh="nw" title="Drag to resize"></div>`;

  el.querySelector('.rm').addEventListener('click',()=>{
    if(!confirm('Remove this widget?')) return;
    cleanup(w.id); prof().widgets=prof().widgets.filter(x=>x.id!==w.id);
    el.remove(); saveS(); updateDropHint();
  });
  const titleEl=el.querySelector('.wh-title');
  titleEl.addEventListener('dblclick',()=>{
    if(S.locked) return; titleEl.contentEditable='true'; titleEl.focus();
    const r=document.createRange(); r.selectNodeContents(titleEl);
    const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
  });
  titleEl.addEventListener('blur',()=>{ titleEl.contentEditable='false'; w.title=titleEl.textContent.trim()||def.label; saveS(); });
  titleEl.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();titleEl.blur();} });

  // Bring to front on any interaction
  el.addEventListener('mousedown', ()=>bringToFront(el,w), {capture:true});
  el.addEventListener('touchstart',()=>bringToFront(el,w), {capture:true,passive:true});

  setupMove(el,w);
  setupResize(el,w);
  setTimeout(()=>initWidget(w),0);
  return el;
}

// ── FREE MOVE (drag header to reposition widget) ──
let _moving=null;
function setupMove(el,w) {
  const header=el.querySelector('.wh'); if(!header) return;
  const startMove=(cX,cY)=>{
    if(S.locked) return;
    _moving={el,w,startX:cX,startY:cY,startElX:w.x??0,startElY:w.y??0};
    document.body.classList.add('moving');
  };
  header.addEventListener('mousedown',e=>{
    if(e.target.closest('.wh-controls,.wh-title[contenteditable="true"]')) return;
    e.preventDefault(); startMove(e.clientX,e.clientY);
  });
  header.addEventListener('touchstart',e=>{
    if(e.target.closest('.wh-controls')) return;
    e.preventDefault(); startMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});
}
function applyMove(cX,cY) {
  const {el,w,startX,startY,startElX,startElY}=_moving;
  const nx=Math.max(0,startElX+(cX-startX)), ny=Math.max(0,startElY+(cY-startY));
  w.x=nx; w.y=ny; el.style.left=nx+'px'; el.style.top=ny+'px';
}
function endMove() {
  if(!_moving) return; saveS(); document.body.classList.remove('moving'); _moving=null;
}

// ── RESIZE (all 8 handles, independent pixel dimensions) ──
const RH_DIRS={
  e:{hDir:1,vDir:0},  w:{hDir:-1,vDir:0},
  s:{hDir:0,vDir:1},  n:{hDir:0,vDir:-1},
  se:{hDir:1,vDir:1}, sw:{hDir:-1,vDir:1},
  ne:{hDir:1,vDir:-1},nw:{hDir:-1,vDir:-1}
};
let _resizing=null;

function setupResize(el,w) {
  el.querySelectorAll('[data-rh]').forEach(handle=>{
    const dir=RH_DIRS[handle.dataset.rh]; if(!dir) return;
    const {hDir,vDir}=dir;
    const cur=hDir&&vDir?(hDir===vDir?'nwse':'nesw'):hDir?'ew':'ns';
    const startDrag=(cX,cY)=>{
      if(S.locked) return;
      _resizing={el,w,startX:cX,startY:cY,
        startW:w.wPx??el.offsetWidth, startH:w.hPx??el.offsetHeight,
        startElX:w.x??0, startElY:w.y??0,
        hDir,vDir,curClass:'resizing-'+cur};
      document.body.classList.add('resizing-'+cur);
    };
    handle.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();startDrag(e.clientX,e.clientY);});
    handle.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  });
}
function applyResize(cX,cY) {
  const {el,w,startX,startY,startW,startH,startElX,startElY,hDir,vDir}=_resizing;
  const MIN_W=160, MIN_H=80;
  if(hDir!==0){
    const dx=cX-startX;
    const newW=Math.max(MIN_W,startW+dx*hDir);
    const deltaW=newW-startW;
    if(hDir===-1){ w.x=Math.max(0,startElX-deltaW); el.style.left=w.x+'px'; }
    w.wPx=newW; el.style.width=newW+'px';
  }
  if(vDir!==0){
    const dy=cY-startY;
    const newH=Math.max(MIN_H,startH+dy*vDir);
    const deltaH=newH-startH;
    if(vDir===-1){ w.y=Math.max(0,startElY-deltaH); el.style.top=w.y+'px'; }
    w.hPx=newH; el.style.height=newH+'px';
  }
}
function endResize(){
  if(!_resizing) return;
  document.body.classList.remove(_resizing.curClass);
  saveS(); _resizing=null;
}

document.addEventListener('mousemove',e=>{ if(_moving) applyMove(e.clientX,e.clientY); if(_resizing) applyResize(e.clientX,e.clientY); });
document.addEventListener('touchmove',e=>{ if(_moving) applyMove(e.touches[0].clientX,e.touches[0].clientY); if(_resizing) applyResize(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
document.addEventListener('mouseup', ()=>{ endMove(); endResize(); });
document.addEventListener('touchend',()=>{ endMove(); endResize(); });

// ── RENDER ──
function renderProfile() {
  const grid=g('grid');
  grid.querySelectorAll('.widget').forEach(el=>{ cleanup(el.dataset.id); el.remove(); });
  // Migrate old grid-based widgets (had size/height but no x/y/wPx/hPx)
  prof().widgets.forEach((w,idx)=>{
    if(w.x==null||w.y==null){
      const [dw,dh]=DEFAULT_SIZES[w.type]||[300,280];
      if(w.wPx==null) w.wPx=dw;
      if(w.hPx==null) w.hPx=w.height||dh;
      const pos=autoPlaceAt(idx,w.wPx,w.hPx);
      w.x=pos.x; w.y=pos.y;
    }
    // Sync z counter
    if(w.z&&w.z>_zCounter) _zCounter=w.z;
  });
  saveS();
  prof().widgets.forEach(w=>{ const el=buildWidget(w); if(el) grid.appendChild(el); });
  updateDropHint();
}
function updateDropHint(){ const h=g('drop-hint'); if(h) h.style.display=prof().widgets.length===0?'flex':'none'; }
function addWidget(type){
  const def=DEFS.find(d=>d.type===type); if(!def) return;
  const [dw,dh]=DEFAULT_SIZES[type]||[300,280];
  const pos=autoPlace(dw,dh);
  const w={id:uid(),type,title:def.label,state:{},x:pos.x,y:pos.y,wPx:dw,hPx:dh};
  prof().widgets.push(w); saveS();
  const el=buildWidget(w); if(el) g('grid').appendChild(el);
  updateDropHint();
}
function initWidget(w){
  const body=g('wb-'+w.id); if(!body) return;
  const fn={clock:initClock,period:initPeriod,timer:initTimer,stopwatch:initStopwatch,pomodoro:initPomodoro,notes:initNotes,checklist:initChecklist,calculator:initCalc,youtube:initYoutube,picker:initPicker,noise:initNoise,qrcode:initQR,webclip:initWebClip,dice:initDice,random:initRandom,seating:initSeating,ticker:initTicker,donow:initDoNow,rotation:initRotation,whiteboard:initWhiteboard,spinner:initSpinner,soundboard:initSoundboard,code:initCode}[w.type];
  if(fn) fn(w,body);
}

// ── CLOCK ──
function initClock(w,body) {
  body.innerHTML=`<div class="clock-time" id="ct-${w.id}"></div><div class="clock-date" id="cd-${w.id}"></div>`;
  function tick() { const now=new Date(); const ct=g('ct-'+w.id),cd=g('cd-'+w.id); if(!ct) return; ct.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}); cd.textContent=now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
  tick(); const iv=setInterval(tick,1000); cleanups[w.id]=()=>clearInterval(iv);
}

// ── PERIOD COUNTDOWN (full schedule) ──
function initPeriod(w,body) {
  const defaults={mode:'single',name:'Period 1',sh:8,sm:0,eh:8,em:50,daily:[],weeklyMode:false,weekly:{1:[],2:[],3:[],4:[],5:[]}};
  w.state=Object.assign({},defaults,w.state||{});
  if(!w.state.weekly) w.state.weekly={};
  for(let d=1;d<=5;d++) { if(!Array.isArray(w.state.weekly[d])) w.state.weekly[d]=[]; }
  if(!Array.isArray(w.state.daily)) w.state.daily=[];
  const s=w.state;
  const fmtT=(h,m)=>fmt2(h)+':'+fmt2(m);

  function getSchedForDay(dow) {
    if(s.weeklyMode){ const ds=s.weekly[dow]; if(Array.isArray(ds)&&ds.length>0) return ds; }
    return s.daily;
  }
  function getPeriodStatus(sch) {
    if(!sch||!sch.length) return {type:'empty'};
    const now=new Date(); const nowM=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
    const fm=sch[0].sh*60+sch[0].sm;
    if(nowM<fm) return {type:'before',next:sch[0],secsUntil:Math.round((fm-nowM)*60)};
    for(let i=0;i<sch.length;i++){
      const p=sch[i],startM=p.sh*60+p.sm,endM=p.eh*60+p.em;
      if(nowM>=startM&&nowM<endM){ const remSecs=Math.max(0,Math.round((endM-nowM)*60)); return {type:'active',period:p,index:i,remSecs,totalSecs:(endM-startM)*60,next:sch[i+1]||null}; }
      if(i<sch.length-1){ const nm=sch[i+1].sh*60+sch[i+1].sm; if(nowM>=endM&&nowM<nm){ return {type:'break',prev:p,next:sch[i+1],secsUntil:Math.round((nm-nowM)*60),totalPassSecs:(nm-endM)*60}; } }
    }
    return {type:'after'};
  }

  const dayNames=['','Mon','Tue','Wed','Thu','Fri'];
  body.innerHTML=`
    <div class="period-name-disp" id="pn-${w.id}">Loading...</div>
    <div class="big-time" id="pt-${w.id}">--:--</div>
    <div class="prog-track"><div class="prog-fill" id="pp-${w.id}" style="width:0%;background:var(--success)"></div></div>
    <div class="period-next" id="pnext-${w.id}"></div>
    <details id="pcfg-${w.id}">
      <summary>Configure schedule</summary>
      <div class="config-block">
        <div class="mode-row">
          <button class="toggle-btn${s.mode==='single'?' on':''}" data-m="single">Single Period</button>
          <button class="toggle-btn${s.mode==='schedule'?' on':''}" data-m="schedule">Full Schedule</button>
        </div>
        <div id="pcsingle-${w.id}" style="${s.mode==='single'?'':'display:none'}">
          <label>Period Name</label><input type="text" id="pname-${w.id}" value="${esc(s.name)}">
          <label>Start time</label><input type="time" id="pstart-${w.id}" value="${fmtT(s.sh,s.sm)}">
          <label>End time</label><input type="time" id="pend-${w.id}" value="${fmtT(s.eh,s.em)}">
          <div class="btn-row"><button class="btn btn-p sm" id="psave-${w.id}">Save</button></div>
        </div>
        <div id="pcsched-${w.id}" style="${s.mode==='schedule'?'':'display:none'}">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:4px">
            <input type="checkbox" id="pweekly-${w.id}" ${s.weeklyMode?'checked':''} style="width:14px;height:14px;accent-color:var(--accent);flex-shrink:0">
            Different schedule each weekday
          </label>
          <div class="day-tabs" id="pdaytabs-${w.id}" style="display:${s.weeklyMode?'flex':'none'}">
            ${dayNames.slice(1).map((d,i)=>`<button class="toggle-btn sm${i===0?' on':''}" data-dayidx="${i+1}">${d}</button>`).join('')}
            <button class="copy-day-btn" id="pcopyall-${w.id}">Copy to all days</button>
          </div>
          <div class="sched-edit-list" id="psched-${w.id}"></div>
          <div class="btn-row" style="margin-top:6px">
            <button class="btn btn-s sm" id="padd-${w.id}">+ Period</button>
            <button class="btn btn-s sm" id="ptempl-${w.id}">Template</button>
            <button class="btn btn-p sm" id="pschedsave-${w.id}">Save</button>
          </div>
        </div>
      </div>
    </details>`;

  let editingDay=1;
  function getEditSch() { return s.weeklyMode?(s.weekly[editingDay]||(s.weekly[editingDay]=[])):s.daily; }
  function renderSchedEdit() {
    const list=g('psched-'+w.id); if(!list) return;
    const sch=getEditSch();
    if(!sch.length){ list.innerHTML='<div class="sched-empty">No periods yet. Use + Period or load a Template.</div>'; return; }
    list.innerHTML=sch.map((p,i)=>`
      <div class="sched-row" data-i="${i}">
        <input type="text" class="sched-name" value="${esc(p.name)}" placeholder="Name" data-i="${i}">
        <input type="time" class="sched-start" value="${fmtT(p.sh,p.sm)}" data-i="${i}">
        <span class="sched-sep">&#x2192;</span>
        <input type="time" class="sched-end" value="${fmtT(p.eh,p.em)}" data-i="${i}">
        <button class="sched-del" data-i="${i}" title="Remove">&#x2715;</button>
      </div>`).join('');
    list.querySelectorAll('.sched-row').forEach(row=>{
      const i=+row.dataset.i;
      row.querySelector('.sched-name').addEventListener('input',e=>{getEditSch()[i].name=e.target.value;});
      row.querySelector('.sched-start').addEventListener('change',e=>{ const [h,m]=e.target.value.split(':').map(Number); getEditSch()[i].sh=h;getEditSch()[i].sm=m; });
      row.querySelector('.sched-end').addEventListener('change',e=>{ const [h,m]=e.target.value.split(':').map(Number); getEditSch()[i].eh=h;getEditSch()[i].em=m; });
      row.querySelector('.sched-del').addEventListener('click',()=>{ getEditSch().splice(i,1); saveS(); renderSchedEdit(); tick(); });
    });
  }

  body.querySelectorAll('[data-m]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      s.mode=btn.dataset.m;
      body.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('on',b.dataset.m===s.mode));
      g('pcsingle-'+w.id).style.display=s.mode==='single'?'':'none';
      g('pcsched-'+w.id).style.display=s.mode==='schedule'?'':'none';
      saveS(); tick();
    });
  });
  g('pweekly-'+w.id)?.addEventListener('change',e=>{ s.weeklyMode=e.target.checked; g('pdaytabs-'+w.id).style.display=s.weeklyMode?'flex':'none'; saveS(); renderSchedEdit(); });
  body.querySelectorAll('[data-dayidx]').forEach(btn=>{ btn.addEventListener('click',()=>{ editingDay=+btn.dataset.dayidx; body.querySelectorAll('[data-dayidx]').forEach(b=>b.classList.toggle('on',+b.dataset.dayidx===editingDay)); renderSchedEdit(); }); });
  g('pcopyall-'+w.id)?.addEventListener('click',()=>{
    const src=JSON.parse(JSON.stringify(getEditSch()));
    if(!src.length){alert('Add periods first.');return;}
    if(!confirm('Copy this schedule to all weekdays (Mon-Fri)?')) return;
    for(let d=1;d<=5;d++) s.weekly[d]=JSON.parse(JSON.stringify(src));
    saveS(); renderSchedEdit(); tick();
  });
  g('padd-'+w.id)?.addEventListener('click',()=>{
    const sch=getEditSch(); const last=sch[sch.length-1];
    let sh=8,sm=0,eh=8,em=45;
    if(last){ const sm2=last.eh*60+last.em+5; sh=Math.floor(sm2/60)%24; sm=sm2%60; const em2=sm2+45; eh=Math.floor(em2/60)%24; em=em2%60; }
    sch.push({name:'Period '+(sch.length+1),sh,sm,eh,em}); saveS(); renderSchedEdit();
  });

  const TEMPLATES={
    '8-Period Day (45 min)':[{name:'Period 1',sh:8,sm:0,eh:8,em:45},{name:'Period 2',sh:8,sm:50,eh:9,em:35},{name:'Period 3',sh:9,sm:40,eh:10,em:25},{name:'Period 4',sh:10,sm:30,eh:11,em:15},{name:'Lunch',sh:11,sm:20,eh:11,em:50},{name:'Period 5',sh:11,sm:55,eh:12,em:40},{name:'Period 6',sh:12,sm:45,eh:13,em:30},{name:'Period 7',sh:13,sm:35,eh:14,em:20}],
    '4-Block Schedule (90 min)':[{name:'Block 1',sh:8,sm:0,eh:9,em:30},{name:'Block 2',sh:9,sm:40,eh:11,em:10},{name:'Lunch',sh:11,sm:10,eh:11,em:55},{name:'Block 3',sh:12,sm:0,eh:13,em:30},{name:'Block 4',sh:13,sm:40,eh:15,em:10}],
    '7-Period Day (42 min)':[{name:'Period 1',sh:8,sm:0,eh:8,em:42},{name:'Period 2',sh:8,sm:47,eh:9,em:29},{name:'Period 3',sh:9,sm:34,eh:10,em:16},{name:'Period 4',sh:10,sm:21,eh:11,em:3},{name:'Lunch',sh:11,sm:8,eh:11,em:38},{name:'Period 5',sh:11,sm:43,eh:12,em:25},{name:'Period 6',sh:12,sm:30,eh:13,em:12}],
    '6-Period College (50 min)':[{name:'Period 1',sh:8,sm:0,eh:8,em:50},{name:'Period 2',sh:9,sm:0,eh:9,em:50},{name:'Period 3',sh:10,sm:0,eh:10,em:50},{name:'Lunch',sh:11,sm:0,eh:11,em:50},{name:'Period 4',sh:12,sm:0,eh:12,em:50},{name:'Period 5',sh:13,sm:0,eh:13,em:50}],
  };
  g('ptempl-'+w.id)?.addEventListener('click',()=>{
    const keys=Object.keys(TEMPLATES);
    const choice=prompt('Load a schedule template:\n\n'+keys.map((k,i)=>(i+1)+'. '+k).join('\n')+'\n\nEnter a number:');
    if(!choice) return;
    const idx=parseInt(choice,10)-1;
    if(idx<0||idx>=keys.length){alert('Invalid choice.');return;}
    const tpl=JSON.parse(JSON.stringify(TEMPLATES[keys[idx]]));
    if(s.weeklyMode) s.weekly[editingDay]=tpl; else s.daily=tpl;
    saveS(); renderSchedEdit(); tick();
  });
  g('pschedsave-'+w.id)?.addEventListener('click',()=>{saveS();tick();});
  g('psave-'+w.id)?.addEventListener('click',()=>{
    s.name=g('pname-'+w.id)?.value||'Period';
    const sv=g('pstart-'+w.id)?.value||'08:00'; const ev=g('pend-'+w.id)?.value||'08:50';
    [s.sh,s.sm]=sv.split(':').map(Number); [s.eh,s.em]=ev.split(':').map(Number);
    saveS(); tick();
  });

  renderSchedEdit();

  function tick() {
    const tEl=g('pt-'+w.id),pEl=g('pp-'+w.id),nEl=g('pn-'+w.id),nextEl=g('pnext-'+w.id);
    if(!tEl) return;
    if(s.mode==='single'){
      const now=new Date(),start=new Date(now),end=new Date(now);
      start.setHours(s.sh,s.sm,0,0); end.setHours(s.eh,s.em,0,0);
      const totalS=(end-start)/1000, remS=Math.max(0,(end-now)/1000);
      const m=Math.floor(remS/60),sec=Math.floor(remS%60);
      tEl.textContent=remS<=0?'Class over':`${fmt2(m)}:${fmt2(sec)}`;
      tEl.className='big-time'+(remS<=0?'':remS<120?' crit':remS<300?' warn':'');
      if(pEl&&totalS>0){pEl.style.width=(remS/totalS*100)+'%';pEl.style.background=remS<120?'var(--danger)':remS<300?'var(--warning)':'var(--success)';}
      if(nEl) nEl.textContent=s.name; if(nextEl) nextEl.innerHTML=''; return;
    }
    const dow=new Date().getDay();
    if(dow===0||dow===6){
      if(nEl) nEl.textContent='Weekend';
      tEl.textContent='No school'; tEl.className='big-time';
      if(pEl){pEl.style.width='100%';pEl.style.background='var(--success)';}
      if(nextEl) nextEl.innerHTML=''; return;
    }
    const sch=getSchedForDay(dow);
    if(!sch||!sch.length){
      if(nEl) nEl.textContent='No schedule';
      tEl.textContent='--:--'; tEl.className='big-time';
      if(pEl) pEl.style.width='0%';
      if(nextEl) nextEl.innerHTML='Add periods in Configure'; return;
    }
    const st=getPeriodStatus(sch);
    const set=(label,time,cls,pct,bg,nextHtml)=>{
      if(nEl) nEl.textContent=label;
      tEl.textContent=time; tEl.className='big-time'+(cls?' '+cls:'');
      if(pEl){pEl.style.width=pct+'%';pEl.style.background=bg;}
      if(nextEl) nextEl.innerHTML=nextHtml;
    };
    if(st.type==='before'){const m=Math.floor(st.secsUntil/60),sec=st.secsUntil%60;set('Before School',fmt2(m)+':'+fmt2(sec),'',0,'var(--accent)','NEXT: <strong>'+esc(st.next.name)+'</strong> @ '+fmtT(st.next.sh,st.next.sm));}
    else if(st.type==='active'){const m=Math.floor(st.remSecs/60),sec=st.remSecs%60;const pct=st.totalSecs>0?(st.remSecs/st.totalSecs*100):0;const cls=st.remSecs<120?'crit':st.remSecs<300?'warn':'';const bg=st.remSecs<120?'var(--danger)':st.remSecs<300?'var(--warning)':'var(--success)';const nh=st.next?'NEXT: <strong>'+esc(st.next.name)+'</strong> @ '+fmtT(st.next.sh,st.next.sm):'Last period of the day';set(st.period.name,fmt2(m)+':'+fmt2(sec),cls,pct,bg,nh);}
    else if(st.type==='break'){const m=Math.floor(st.secsUntil/60),sec=st.secsUntil%60;const pct=st.totalPassSecs>0?(st.secsUntil/st.totalPassSecs*100):50;set('Passing Period',fmt2(m)+':'+fmt2(sec),'warn',pct,'var(--warning)','NEXT: <strong>'+esc(st.next.name)+'</strong> @ '+fmtT(st.next.sh,st.next.sm));}
    else if(st.type==='after'){set("School's Out!",'Done','',100,'var(--success)','');}
    else{set('No schedule','--:--','',0,'var(--border)','Add periods in Configure');}
  }
  tick(); const iv=setInterval(tick,1000); cleanups[w.id]=()=>clearInterval(iv);
}

// ── TIMER ──
function initTimer(w,body) {
  w.state=w.state||{totalS:300,remS:300,running:false};
  const s=w.state; let startTime=null,iv=null,alerted=false;
  const fmt=secs=>{ const neg=secs<0; secs=Math.abs(secs); return (neg?'-':'')+String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0'); };
  body.innerHTML=`
    <div class="big-time" id="tt-${w.id}">${fmt(s.remS)}</div>
    <div class="prog-track"><div class="prog-fill" id="tp-${w.id}" style="width:100%;background:var(--accent)"></div></div>
    <div class="timer-inputs">
      <input type="number" class="t-inp" id="tmin-${w.id}" min="0" max="99" value="${Math.floor(s.totalS/60)}">
      <span style="font-size:18px;color:var(--text2)">:</span>
      <input type="number" class="t-inp" id="tsec-${w.id}" min="0" max="59" value="${s.totalS%60}">
    </div>

      <button class="preset pass" data-m="5" title="Passing period">5m pass</button>
      ${[1,2,3,10,15,20,25,30,45,60].map(m=>`<button class="preset" data-m="${m}">${m}m</button>`).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-p sm" id="tstart-${w.id}">&#x25B6; Start</button>
      <button class="btn btn-s sm" id="treset-${w.id}">&#x21BA; Reset</button>
    </div>`;
  function updateDisp(){const tEl=g('tt-'+w.id),pEl=g('tp-'+w.id);if(!tEl)return;tEl.textContent=fmt(s.remS);const pct=s.totalS>0?Math.max(0,Math.min(100,s.remS/s.totalS*100)):0;if(pEl)pEl.style.width=pct+'%';tEl.className='big-time'+(s.remS<=0?' crit':s.remS<=60?' warn':'');if(pEl)pEl.style.background=s.remS<=0?'var(--danger)':s.remS<=60?'var(--warning)':'var(--accent)';}
  function tick(){if(!s.running)return;s.remS=s.totalS-Math.floor((Date.now()-startTime)/1000);updateDisp();if(s.remS<=0&&!alerted){alerted=true;playAlert();stop();}}
  function stop(){s.running=false;s.totalS=Math.max(0,s.remS);clearInterval(iv);iv=null;const b=g('tstart-'+w.id);if(b)b.textContent='&#x25B6; Start';saveS();}
  g('tstart-'+w.id)?.addEventListener('click',()=>{if(s.running){stop();return;}if(s.remS<=0){s.totalS=(+g('tmin-'+w.id)?.value||0)*60+(+g('tsec-'+w.id)?.value||0);s.remS=s.totalS;alerted=false;}if(s.remS<=0)return;startTime=Date.now()-(s.totalS-s.remS)*1000;s.running=true;iv=setInterval(tick,500);const b=g('tstart-'+w.id);if(b)b.textContent='&#x23F8; Pause';saveS();});
  g('treset-'+w.id)?.addEventListener('click',()=>{clearInterval(iv);iv=null;s.running=false;s.totalS=(+g('tmin-'+w.id)?.value||5)*60+(+g('tsec-'+w.id)?.value||0);s.remS=s.totalS;alerted=false;updateDisp();const b=g('tstart-'+w.id);if(b)b.textContent='&#x25B6; Start';saveS();});
  body.querySelectorAll('.preset').forEach(b=>{b.addEventListener('click',()=>{const m=+b.dataset.m;const mi=g('tmin-'+w.id),si=g('tsec-'+w.id);if(mi)mi.value=m;if(si)si.value=0;clearInterval(iv);iv=null;s.running=false;s.totalS=m*60;s.remS=s.totalS;alerted=false;updateDisp();const b2=g('tstart-'+w.id);if(b2)b2.textContent='&#x25B6; Start';saveS();});});
  updateDisp();
  if(s.running){startTime=Date.now()-(s.totalS-s.remS)*1000;iv=setInterval(tick,500);const b=g('tstart-'+w.id);if(b)b.textContent='&#x23F8; Pause';}
  cleanups[w.id]=()=>clearInterval(iv);
}

// ── STOPWATCH ──
function initStopwatch(w,body) {
  let running=false,elapsed=0,startT=null,laps=[];
  body.innerHTML=`<div class="big-time" id="sw-${w.id}" style="font-size:clamp(24px,5vw,48px)">00:00.0</div><div class="btn-row"><button class="btn btn-p sm" id="sws-${w.id}">&#x25B6; Start</button><button class="btn btn-s sm" id="swl-${w.id}">Lap</button><button class="btn btn-s sm" id="swr-${w.id}">&#x21BA;</button></div><div class="sw-laps" id="swlaps-${w.id}"></div>`;
  const fmt=ms=>{const cs=Math.floor(ms/100)%10,sec=Math.floor(ms/1000)%60,m=Math.floor(ms/60000);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')+'.'+cs;};
  let iv=null;
  function update(){const el=g('sw-'+w.id);if(el)el.textContent=fmt(running?elapsed+(Date.now()-startT):elapsed);}
  g('sws-'+w.id)?.addEventListener('click',()=>{const b=g('sws-'+w.id);if(running){elapsed+=Date.now()-startT;running=false;clearInterval(iv);iv=null;if(b)b.textContent='&#x25B6; Start';}else{startT=Date.now();running=true;iv=setInterval(update,100);if(b)b.textContent='&#x23F8; Pause';}});
  g('swl-'+w.id)?.addEventListener('click',()=>{const t=running?elapsed+(Date.now()-startT):elapsed;if(t===0)return;laps.push(t);const ld=g('swlaps-'+w.id);if(ld){const d=document.createElement('div');d.className='sw-lap';d.innerHTML='<span>Lap '+laps.length+'</span><span>'+fmt(t)+'</span>';ld.insertBefore(d,ld.firstChild);}});
  g('swr-'+w.id)?.addEventListener('click',()=>{running=false;clearInterval(iv);iv=null;elapsed=0;startT=null;laps=[];const el=g('sw-'+w.id);if(el)el.textContent='00:00.0';const ld=g('swlaps-'+w.id);if(ld)ld.innerHTML='';const b=g('sws-'+w.id);if(b)b.textContent='&#x25B6; Start';});
  cleanups[w.id]=()=>clearInterval(iv);
}

// ── POMODORO (configurable durations) ──
function initPomodoro(w,body) {
  w.state=w.state||{workMin:25,breakMin:5,longMin:15};
  const ps=w.state; const CIRC=2*Math.PI*50;
  let phase='work',pomos=0,running=false,startT=null,iv=null;
  let WORK=(ps.workMin||25)*60,BREAK=(ps.breakMin||5)*60,LONG=(ps.longMin||15)*60,remS=WORK;
  body.innerHTML=`
    <div class="pomo-phase" id="pomoph-${w.id}">Focus</div>
    <div class="pomo-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110">
        <circle class="pr-bg" cx="55" cy="55" r="50"/>
        <circle class="pr-fill" id="pomoring-${w.id}" cx="55" cy="55" r="50" stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
      </svg>

    <div class="btn-row">
      <button class="btn btn-p sm" id="pomogo-${w.id}">&#x25B6; Start</button>

    </div>

      <summary>Durations</summary>
      <div class="config-block" style="margin-top:6px">
        <div class="pomo-cfg-row"><span style="width:70px">Focus</span><input type="number" id="pomowork-${w.id}" value="${ps.workMin||25}" min="1" max="120"><span>min</span></div>
        <div class="pomo-cfg-row"><span style="width:70px">Break</span><input type="number" id="pomobreak-${w.id}" value="${ps.breakMin||5}" min="1" max="60"><span>min</span></div>
        <div class="pomo-cfg-row"><span style="width:70px">Long break</span><input type="number" id="pomolong-${w.id}" value="${ps.longMin||15}" min="1" max="90"><span>min</span></div>

  const totalForPhase=()=>phase==='work'?WORK:phase==='longbreak'?LONG:BREAK;
  const fmt=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  function updateDisp(){const tEl=g('pomotime-'+w.id),rEl=g('pomoring-'+w.id),phEl=g('pomoph-'+w.id),cEl=g('pomocount-'+w.id);if(!tEl)return;tEl.textContent=fmt(remS);const total=totalForPhase();if(rEl)rEl.style.strokeDashoffset=CIRC*(1-remS/total);const isWork=phase==='work';if(rEl)rEl.style.stroke=isWork?'var(--accent)':'var(--success)';if(phEl){phEl.textContent=phase==='work'?'Focus':phase==='longbreak'?'Long Break':'Break';phEl.style.color=isWork?'var(--accent)':'var(--success)';}if(cEl)cEl.textContent=pomos;}
  function tick(){remS=Math.max(0,totalForPhase()-Math.floor((Date.now()-startT)/1000));updateDisp();if(remS<=0){clearInterval(iv);iv=null;running=false;playAlert();if(phase==='work'){pomos++;phase=pomos%4===0?'longbreak':'break';}else phase='work';remS=totalForPhase();updateDisp();const b=g('pomogo-'+w.id);if(b)b.textContent='&#x25B6; Start';}}
  g('pomogo-'+w.id)?.addEventListener('click',()=>{const b=g('pomogo-'+w.id);if(running){running=false;clearInterval(iv);iv=null;if(b)b.textContent='&#x25B6; Start';}else{if(remS<=0)remS=totalForPhase();startT=Date.now()-(totalForPhase()-remS)*1000;running=true;iv=setInterval(tick,500);if(b)b.textContent='&#x23F8; Pause';}});
  g('pomoskip-'+w.id)?.addEventListener('click',()=>{clearInterval(iv);iv=null;running=false;if(phase==='work'){pomos++;phase=pomos%4===0?'longbreak':'break';}else phase='work';remS=totalForPhase();updateDisp();const b=g('pomogo-'+w.id);if(b)b.textContent='&#x25B6; Start';});
  g('pomoreset-'+w.id)?.addEventListener('click',()=>{clearInterval(iv);iv=null;running=false;phase='work';pomos=0;WORK=(ps.workMin||25)*60;BREAK=(ps.breakMin||5)*60;LONG=(ps.longMin||15)*60;remS=WORK;updateDisp();const b=g('pomogo-'+w.id);if(b)b.textContent='&#x25B6; Start';});
  g('pomosave-'+w.id)?.addEventListener('click',()=>{ps.workMin=Math.max(1,+g('pomowork-'+w.id)?.value||25);ps.breakMin=Math.max(1,+g('pomobreak-'+w.id)?.value||5);ps.longMin=Math.max(1,+g('pomolong-'+w.id)?.value||15);WORK=ps.workMin*60;BREAK=ps.breakMin*60;LONG=ps.longMin*60;clearInterval(iv);iv=null;running=false;phase='work';pomos=0;remS=WORK;updateDisp();const b=g('pomogo-'+w.id);if(b)b.textContent='&#x25B6; Start';saveS();});
  updateDisp(); cleanups[w.id]=()=>clearInterval(iv);
}

// ── CHECKLIST (fixed state bug + progress bar) ──
function initChecklist(w,body) {
  if(!w.state||typeof w.state!=='object') w.state={};
  if(!Array.isArray(w.state.items)) w.state.items=[];
  if(!w.state.fontSize) w.state.fontSize=14;
  const s=w.state;
  function render() {
    const items=s.items;
    const done=items.filter(x=>x.done).length;
    const pct=items.length>0?Math.round(done/items.length*100):0;
    const fs=s.fontSize;
    body.innerHTML=`
      <div class="cl-list" id="cll-${w.id}" style="font-size:${fs}px">
        ${items.map((it,i)=>`<div class="cl-item${it.done?' done':''}" data-i="${i}"><input type="checkbox"${it.done?' checked':''} data-i="${i}"><input class="cl-text" type="text" value="${esc(it.text)}" data-i="${i}" placeholder="Item..." style="font-size:${fs}px"><button class="cl-del" data-i="${i}">&#x2715;</button></div>`).join('')}
      </div>
      <div class="cl-add">
        <input type="text" id="cladd-${w.id}" placeholder="Add item..." style="font-size:${fs}px">
        <button class="btn btn-p sm" id="clbtn-${w.id}">Add</button>
      </div>
      <div class="cl-footer">
        <div class="cl-progress">
          <span>${done}/${items.length}</span>
          <div class="cl-prog-bar"><div class="cl-prog-fill" style="width:${pct}%"></div></div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          <button class="btn btn-s sm" id="clfa-${w.id}" title="Smaller text">A-</button>
          <span style="font-size:11px;color:var(--text2);min-width:26px;text-align:center;" id="clfs-${w.id}">${fs}px</span>
          <button class="btn btn-s sm" id="clfb-${w.id}" title="Larger text">A+</button>
          <button class="btn btn-s sm" id="clclr-${w.id}">Clear done</button>
          <button class="btn btn-s sm" id="clunch-${w.id}">Uncheck all</button>
        </div>
      </div>`;
    body.querySelectorAll('input[type="checkbox"]').forEach(cb=>{ cb.addEventListener('change',()=>{ const i=+cb.dataset.i;s.items[i].done=cb.checked;cb.closest('.cl-item').classList.toggle('done',cb.checked);saveS();render(); }); });
    body.querySelectorAll('.cl-text').forEach(inp=>{ inp.addEventListener('change',()=>{s.items[+inp.dataset.i].text=inp.value;saveS();}); });
    body.querySelectorAll('.cl-del').forEach(b=>{ b.addEventListener('click',()=>{s.items.splice(+b.dataset.i,1);saveS();render();}); });
    function addItem(){const inp=g('cladd-'+w.id);if(!inp)return;const t=inp.value.trim();if(!t)return;s.items.push({text:t,done:false});inp.value='';saveS();render();setTimeout(()=>g('cladd-'+w.id)?.focus(),30);}
    g('clbtn-'+w.id)?.addEventListener('click',addItem);
    g('cladd-'+w.id)?.addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});
    g('clclr-'+w.id)?.addEventListener('click',()=>{s.items=s.items.filter(x=>!x.done);saveS();render();});
    g('clunch-'+w.id)?.addEventListener('click',()=>{s.items.forEach(x=>x.done=false);saveS();render();});
    g('clfa-'+w.id)?.addEventListener('click',()=>{s.fontSize=Math.max(10,s.fontSize-2);saveS();render();});
    g('clfb-'+w.id)?.addEventListener('click',()=>{s.fontSize=Math.min(28,s.fontSize+2);saveS();render();});
  }
  render();
}

// ── CALCULATOR ──
function initCalc(w,body) {

  body.innerHTML=`<div class="calc-screen"><div class="calc-expr" id="ce-${w.id}"></div><div class="calc-val" id="cv-${w.id}">0</div></div><div class="calc-grid">${[['C','&#x00B1;','%','&#xF7;'],['7','8','9','&#xD7;'],['4','5','6','&#x2212;'],['1','2','3','+'],['0','0','.','=']].map((row,ri)=>row.map((v,ci)=>{if(ri===4&&ci===1)return'';let cls='cb';if(['&#xF7;','&#xD7;','&#x2212;','+'].includes(v))cls+=' op';if(v==='C')cls+=' clr';if(v==='=')cls+=' eq';if(ri===4&&ci===0)cls+=' dbl';return'<button class="'+cls+'" data-v="'+v+'">'+v+'</button>';}).join('')).join('')}</div>`;
  function upd(){const e=g('ce-'+w.id),v=g('cv-'+w.id);if(e)e.textContent=expr;if(v)v.textContent=disp;}

}

// ── YOUTUBE ──
function initYoutube(w,body) {
  w.state=w.state||{url:''};
  body.style.display='flex'; body.style.flexDirection='column'; body.style.overflow='hidden';

  // Returns {vid, list} from any YouTube URL
  function parseYT(url) {
    if(!url) return {vid:null,list:null};
    try {
      const u=new URL(url.startsWith('http')?url:'https://'+url);
      const vid=u.searchParams.get('v')
        ||url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/)?.[1]
        ||url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/)?.[1]
        ||null;
      const list=u.searchParams.get('list')||null;
      return {vid,list};
    } catch(e){ return {vid:null,list:null}; }
  }

  function buildSrc({vid,list}) {
    if(!vid&&!list) return null;
    const p=new URLSearchParams({rel:'0',modestbranding:'1'});
    if(list) p.set('list',list);
    if(vid) return 'https://www.youtube.com/embed/'+vid+'?'+p;
    return 'https://www.youtube.com/embed/videoseries?'+p; // playlist-only
  }

  function renderEmbed(url) {
    const a=g('yta-'+w.id); if(!a) return;
    const parsed=parseYT(url);
    const src=buildSrc(parsed);
    if(src){
      const badge=parsed.list
        ?'<div style="font-size:10px;color:var(--text2);padding:2px 8px;background:var(--surface2);border-radius:4px;margin-bottom:4px;">&#x1F4CB; Playlist — use player arrows to navigate</div>'
        :'';
      a.innerHTML=badge+'<iframe style="flex:1;width:100%;min-height:0;border:0;border-radius:8px;background:#000" src="'+esc(src)+'" allowfullscreen allow="autoplay;encrypted-media"></iframe>';
    } else {
      a.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;border:2px dashed var(--border);color:var(--text2);font-size:13px;min-height:80px;text-align:center;padding:12px">Paste a YouTube video or playlist URL above</div>';
    }
  }

// ── NAME PICKER ──
function initPicker(w,body) {
  // Migrate single-roster state
  if(!w.state||!Array.isArray(w.state.rosters)){
    const old=w.state||{};
    w.state={rosters:[{name:'Class 1',names:old.names||''}],active:0,last:old.last||''};
  }
  const s=w.state;
  if(!Number.isInteger(s.active)||s.active>=s.rosters.length) s.active=0;
  let pickedSets=s.rosters.map(()=>new Set());

  function activeR(){ return s.rosters[s.active]; }
  function getNames(){ return (activeR().names||'').split('\n').map(n=>n.trim()).filter(Boolean); }

  function render(){
    const tabs=s.rosters.map((r,i)=>`<button class="toggle-btn sm${i===s.active?' on':''}" data-ri="${i}" title="${esc(r.name)}">${esc(r.name.length>8?r.name.slice(0,7)+'\u2026':r.name)}</button>`).join('');
    const canAdd=s.rosters.length<8;
    body.innerHTML=`
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;align-items:center;">
        ${tabs}
        ${canAdd?`<button class="copy-day-btn" id="paddc-${w.id}">+ Class</button>`:''}
      </div>
      <div class="picker-result" id="pr-${w.id}">${s.last?esc(s.last):'Press Pick!'}</div>
      <div class="btn-row">
        <button class="btn btn-p" id="pick-${w.id}">Pick!</button>
        <button class="btn btn-s sm" id="pickreset-${w.id}">Reset pool</button>
      </div>
      <details style="margin-top:8px">
        <summary>Edit: ${esc(activeR().name)} <span id="pmeta-${w.id}" style="font-weight:400"></span></summary>
        <div style="display:flex;gap:4px;margin:6px 0 4px">
          <input type="text" id="prname-${w.id}" value="${esc(activeR().name)}" style="flex:1;font-size:11px;padding:4px 6px" placeholder="Class name">
          <button class="btn btn-s sm" id="prenm-${w.id}">Rename</button>
          ${s.rosters.length>1?`<button class="btn btn-s sm" id="prdel-${w.id}" style="color:var(--danger)">Delete</button>`:''}
        </div>
        <textarea class="picker-names" id="pnames-${w.id}" placeholder="One name per line...">${esc(activeR().names)}</textarea>
      </details>`;

    body.querySelectorAll('[data-ri]').forEach(btn=>{
      btn.addEventListener('click',()=>{ s.active=+btn.dataset.ri; saveS(); render(); });
    });
    g('paddc-'+w.id)?.addEventListener('click',()=>{
      if(s.rosters.length>=8) return;
      s.rosters.push({name:'Class '+(s.rosters.length+1),names:''});
      pickedSets.push(new Set());
      s.active=s.rosters.length-1; saveS(); render();
    });
    g('prenm-'+w.id)?.addEventListener('click',()=>{
      const n=g('prname-'+w.id)?.value.trim(); if(n){activeR().name=n;saveS();render();}
    });
    g('prdel-'+w.id)?.addEventListener('click',()=>{
      if(s.rosters.length<=1||!confirm('Delete "'+activeR().name+'"?')) return;
      s.rosters.splice(s.active,1); pickedSets.splice(s.active,1);
      s.active=Math.min(s.active,s.rosters.length-1); saveS(); render();
    });
    g('pnames-'+w.id)?.addEventListener('input',()=>{ activeR().names=g('pnames-'+w.id)?.value||''; saveS(); updateMeta(); });
    g('pickreset-'+w.id)?.addEventListener('click',()=>{ pickedSets[s.active].clear(); updateMeta(); const r=g('pr-'+w.id); if(r)r.textContent='Pool reset!'; });
    g('pick-'+w.id)?.addEventListener('click',()=>{
      const names=getNames();
      if(!names.length){const r=g('pr-'+w.id);if(r)r.textContent='Add names first!';return;}
      let avail=names.filter(n=>!pickedSets[s.active].has(n));
      if(!avail.length){pickedSets[s.active].clear();avail=names;}
      const r=g('pr-'+w.id); if(!r) return;
      r.classList.add('spinning'); let c=0;
      const spin=setInterval(()=>{
        r.textContent=avail[Math.floor(Math.random()*avail.length)]; c++;
        if(c>=14){clearInterval(spin);r.classList.remove('spinning');
          const chosen=avail[Math.floor(Math.random()*avail.length)];
          r.textContent=chosen; pickedSets[s.active].add(chosen); s.last=chosen; saveS(); updateMeta();}
      },75);
    });
    updateMeta();
  }

  function updateMeta(){
    const names=getNames(); const m=g('pmeta-'+w.id);
    if(m) m.textContent='('+names.length+' names, '+(names.length-pickedSets[s.active].size)+' left)';
  }
  render();
}

// ── NOISE METER ──
function initNoise(w,body) {
  let stream=null,analyser=null,iv=null,active=false;
  body.innerHTML=`<button class="mic-btn" id="micbtn-${w.id}">&#x1F3A4; Enable Microphone</button><div class="noise-bars" id="nbars-${w.id}">${Array(14).fill(0).map(()=>'<div class="n-bar" style="height:3px"></div>').join('')}</div><div class="noise-pct" id="npct-${w.id}">--%</div><div class="noise-status" id="nstatus-${w.id}">Microphone off</div><div class="noise-thresh"><span>Alert at:</span><input type="range" id="nthresh-${w.id}" min="10" max="100" value="70"><span id="ntlabel-${w.id}">70%</span></div>`;
  g('nthresh-'+w.id)?.addEventListener('input',()=>{const t=g('nthresh-'+w.id)?.value;const l=g('ntlabel-'+w.id);if(l)l.textContent=t+'%';});
  g('micbtn-'+w.id)?.addEventListener('click',async()=>{if(active){active=false;if(stream)stream.getTracks().forEach(t=>t.stop());clearInterval(iv);iv=null;const b=g('micbtn-'+w.id);if(b){b.textContent='&#x1F3A4; Enable Microphone';b.classList.remove('on');}const s=g('nstatus-'+w.id);if(s)s.textContent='Microphone off';const bars=g('nbars-'+w.id);if(bars)bars.querySelectorAll('.n-bar').forEach(b=>{b.style.height='3px';b.className='n-bar';});const p=g('npct-'+w.id);if(p)p.textContent='--%';}else{try{stream=await navigator.mediaDevices.getUserMedia({audio:true});const ctx=new AudioContext(),src=ctx.createMediaStreamSource(stream);analyser=ctx.createAnalyser();analyser.fftSize=256;src.connect(analyser);active=true;const b=g('micbtn-'+w.id);if(b){b.textContent='&#x1F534; Disable Microphone';b.classList.add('on');}const data=new Uint8Array(analyser.frequencyBinCount);iv=setInterval(()=>{if(!analyser)return;analyser.getByteFrequencyData(data);const avg=data.reduce((a,x)=>a+x,0)/data.length;const pct=Math.min(100,Math.round(avg/128*100));const thresh=+(g('nthresh-'+w.id)?.value||70);const pEl=g('npct-'+w.id),sEl=g('nstatus-'+w.id),barsEl=g('nbars-'+w.id);if(pEl)pEl.textContent=pct+'%';if(sEl){if(pct<thresh*0.5){sEl.textContent='&#x1F7E2; Quiet';sEl.style.color='var(--success)';}else if(pct<thresh){sEl.textContent='&#x1F7E1; Moderate';sEl.style.color='var(--warning)';}else{sEl.textContent='&#x1F534; Too Loud!';sEl.style.color='var(--danger)';}}if(barsEl){const bs=barsEl.querySelectorAll('.n-bar');const n=bs.length;for(let i=0;i<n;i++){const di=Math.floor(i*data.length/n);const h=Math.max(3,(data[di]/255)*70);bs[i].style.height=h+'px';bs[i].className='n-bar'+(data[di]>200?' h':data[di]>128?' m':'');}}},100);}catch(e){const s=g('nstatus-'+w.id);if(s)s.textContent='Mic access denied';}}});
  cleanups[w.id]=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());clearInterval(iv);};
}

// ── WEB CLIP ──
function initWebClip(w,body) {
  w.state=w.state||{url:''};
  body.style.cssText='display:flex;flex-direction:column;overflow:hidden;padding:0;gap:0;';

  function toEmbedUrl(u) {
    // Google Slides: /edit or /view → /embed
    const slides=u.match(/docs\.google\.com\/presentation\/d\/([a-zA-Z0-9_-]+)/);
    if(slides) return 'https://docs.google.com/presentation/d/'+slides[1]+'/embed?start=false&loop=false&delayms=5000';
    // Google Docs: → /preview
    const docs=u.match(/docs\.google\.com\/document\/d\/([a-zA-Z0-9_-]+)/);
    if(docs) return 'https://docs.google.com/document/d/'+docs[1]+'/preview';
    // Google Sheets: → /htmlview
    const sheets=u.match(/docs\.google\.com\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if(sheets) return 'https://docs.google.com/spreadsheets/d/'+sheets[1]+'/htmlview';
    return u;
  }

  function renderFrame(u) {
    const out=g('wcout-'+w.id); if(!out) return;
    if(!u){out.innerHTML='<div class="yt-empty" style="aspect-ratio:unset;flex:1;min-height:80px">Enter a URL above to embed a page or Google Slides</div>';return;}
    const embed=toEmbedUrl(u);
    const converted=embed!==u;
    out.innerHTML=(converted?'<div style="font-size:10px;color:var(--text2);padding:2px 8px;background:var(--surface2);">Auto-converted to embed format</div>':'')+
      '<iframe class="wc-frame" src="'+esc(embed)+'" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>';
  }

  body.innerHTML='<div class="yt-controls"><input type="url" id="wcu-'+w.id+'" placeholder="Paste URL or Google Slides link..." value="'+esc(w.state.url)+'"><button class="btn btn-p sm" id="wcload-'+w.id+'">Load</button></div><div id="wcout-'+w.id+'" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div>';
  g('wcload-'+w.id)?.addEventListener('click',()=>{
    let u=(g('wcu-'+w.id)?.value||'').trim();
    if(u&&!u.startsWith('http'))u='https://'+u;
    w.state.url=u; saveS(); renderFrame(u);
  });
  g('wcu-'+w.id)?.addEventListener('keydown',e=>{if(e.key==='Enter')g('wcload-'+w.id)?.click();});
  if(w.state.url) renderFrame(w.state.url);
}

// ── SEATING CHART ──
function initSeating(w,body) {
  if(!w.state||typeof w.state!=='object') w.state={};
  if(!Array.isArray(w.state.charts)) w.state.charts=[{name:'Period 1',rows:4,cols:6,seats:{}}];
  if(!Number.isInteger(w.state.active)||w.state.active>=w.state.charts.length) w.state.active=0;

  function activeC(){ return s.charts[s.active]; }

  function render() {
    const c=activeC();
    const tabs=s.charts.map((ch,i)=>`<button class="toggle-btn sm${i===s.active?' on':''}" data-ci="${i}" title="${esc(ch.name)}">${esc(ch.name.length>8?ch.name.slice(0,7)+'…':ch.name)}</button>`).join('');
    const canAdd=s.charts.length<8;
    let gridHtml='';
    for(let r=0;r<c.rows;r++){
      for(let col=0;col<c.cols;col++){
        const key=r+'_'+col;
